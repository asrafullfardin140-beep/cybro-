<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybro Marketing | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #07111f;
            --primary: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        /* Nav */
        .indi-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(7, 17, 31, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .indi-nav .logo {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .indi-nav-links {
            display: flex;
            gap: 40px;
        }

        .indi-nav-links a {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-decoration: none;
        }

        .indi-nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .indi-nav-links a:hover::after {
            width: 100%;
        }

        /* Contact Layout */
        .contact-section {
            padding: 200px 50px 100px;
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            min-height: 100vh;
        }

        .contact-info h1 {
            font-family: var(--font-heading);
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
        }

        .contact-info p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 50px;
            line-height: 1.6;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contact-detail-block h4 {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: var(--primary);
        }

        .contact-detail-block p {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text-main);
        }

        /* Form */
        .contact-form {
            background: rgba(255, 255, 255, 0.02);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-family: var(--font-heading);
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 15px 0;
            font-size: 1.2rem;
            color: #fff;
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-bottom-color: var(--primary);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn-submit {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 20px 50px;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #fff;
            color: var(--bg-dark);
            transform: translateY(-5px);
        }

        @media (max-width: 1024px) {
            .contact-section { grid-template-columns: 1fr; gap: 50px; }
            .indi-nav { padding: 20px; }
            .indi-nav-links { gap: 20px; font-size: 0.9rem; }
        }
        @media (max-width: 768px) {
            .contact-section { padding: 150px 20px 50px; }
            .contact-form { padding: 30px; }
            .indi-nav { padding: 15px; flex-direction: column; gap: 15px; }
            .indi-nav-links { width: 100%; justify-content: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav class="indi-nav">
        <a href="index.html" class="logo">CYBRO.</a>
        <div class="indi-nav-links">
            <a href="projects.html">Work</a>
            <a href="index.html#services-section">Services</a>
            <a href="contact.html">Let's Talk</a>
        </div>
    </nav>

    <section class="contact-section">
        <div class="contact-info">
            <h1>Let's <br>Talk.</h1>
            <p>Ready to build your digital empire? Drop us a line and let's discuss how we can scale your brand to the next level.</p>
            
            <div class="contact-details">
                <div class="contact-detail-block">
                    <h4>Email</h4>
                    <p>hello@cybromarketing.com</p>
                </div>
                <div class="contact-detail-block">
                    <h4>Location</h4>
                    <p>Global / Remote</p>
                </div>
            </div>
        </div>

        <div class="contact-form">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@company.com" required>
                </div>
                <div class="form-group">
                    <label>Service Interested In</label>
                    <input type="text" placeholder="E.g. Paid Ads, Web Dev..." required>
                </div>
                <div class="form-group">
                    <label>Project Details</label>
                    <textarea placeholder="Tell us about your goals..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>
    </section>

</body>
</html>
